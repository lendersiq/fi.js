<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="img-src 'self' data:; default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://bankersiq.com; object-src 'none';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../styles/base.css">
  <title>Commercial Checking Risk</title>
</head>
<body>
  <script>
    // App configuration
    const appConfig = {
        description: `<p>This tutorial calculates and ranks the risk of each commercial checking account relationship based on several factors and their associated weights.</p>

      <h4>Average Balance (Weight 5): A high average balance indicates a higher exposure and might justify offering Positive Pay as a risk mitigant.</h4>
      <ul>
          <li><span>5</span> - Average Balance exceeds 3 standard deviations | <span>2</span> - Average Balance exceeds mean | <span>1</span> - Default</li>
      </ul>
      <h4>Number of Checks Written in 1 Month (Weight 5): Businesses issuing checks for payroll, vendor payments, or refunds during specific times of the year may have a greater risk.</h4>
      <ul>
          <li><span>5</span> - Checks exceed 3 standard deviations | <span>4</span> - Checks exceed 2 standard deviations | <span>2</span> - Checks exceed mean | <span>1</span> - Default</li>
      </ul>
      <h4>Number of Deposits in 1 Month (Weight 3): Regular deposits (e.g., payroll or vendor payments) indicate frequency of activity. Higher active accounts may indicate risk.</h4>
      <ul>
          <li><span>5</span> - Deposits exceed 3 standard deviations | <span>2</span> - Deposits exceed 2 standard deviations | <span>1</span> - Default</li>
      </ul>
      <h4>Number of NSFs in 1 Month (Weight 1): High overdraft activity could signal poor account management.</h4>
      <ul>
          <li><span>5</span> - Exceed 3 standard deviations | <span>1</span> - Default</li>
      </ul>`,
      libraries: [
        'financial',
      ],
      formula: 'checking.risk',
      groupBy: 'Portfolio',
      presentation: {
        columns: [
          { heading: 'Officer', field: 'officer' },
          { heading: 'Branch', field: 'branch' },
          { heading: 'Balance', field: 'balance' },
        ],
      }
    };
  </script>
  <script src="../../core/fi.js" defer></script>
</body>
</html>
